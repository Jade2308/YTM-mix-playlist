<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>YTM Playlist Mixer</title>

  <!-- Font hỗ trợ tiếng Việt -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@600;700;800&family=Inter:wght@500;600;700&display=swap&subset=vietnamese" rel="stylesheet">

  <style>
    :root{
      --bg: #0d1117;
      --card: #151a21;
      --muted: #9aa0a6;
      --text: #e9eef4;
      --border: #242a33;
      --accent: #4c8dff;
      --radius-lg: 16px;
      --radius-md: 12px;
      --shadow: 0 10px 28px rgba(0,0,0,0.28);
      color-scheme: dark;
    }
    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family: "Be Vietnam Pro", "Inter", "Segoe UI", -apple-system, system-ui, sans-serif;
      font-weight: 500;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      padding: max(12px, env(safe-area-inset-left)) max(12px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    }

    .wrap{ width:100%; max-width: 780px; margin:0 auto; display:flex; flex-direction:column; gap:12px; }
    header{ display:flex; align-items:flex-start; gap:10px; padding:2px; }
    h1{
      margin:0; font-size:26px; letter-spacing:-0.01em; font-weight:800;
      font-family: "Be Vietnam Pro", "Inter", "Segoe UI", -apple-system, system-ui, sans-serif;
      line-height:1.2;
    }
    .sub{ margin:4px 0 0; color:var(--muted); font-size:14px; line-height:1.4; }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:14px;
      box-shadow:var(--shadow);
    }

    label{
      display:flex; align-items:center; gap:6px;
      font-weight:700; font-size:14px; margin:12px 0 6px;
      font-family: "Be Vietnam Pro", "Inter", "Segoe UI", -apple-system, system-ui, sans-serif;
    }
    .field{ position:relative; }

    input, select{
      width:100%; font-size:16px; line-height:1.35;
      padding:13px 13px;
      border-radius:var(--radius-md);
      border:1px solid var(--border);
      background:#0f141b; color:var(--text);
      outline:none;
      transition:border-color 0.12s ease, box-shadow 0.12s ease;
      font-family: "Be Vietnam Pro", "Inter", "Segoe UI", -apple-system, system-ui, sans-serif;
      min-height:48px;
    }
    input:focus, select:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(76,141,255,0.2);
    }

    .row{ display:grid; grid-template-columns:1fr; gap:12px; }
    @media (min-width:640px){ .row.two{ grid-template-columns:1fr 1fr; } }

    .hint{ color:var(--muted); font-size:12.5px; margin-top:4px; line-height:1.35; }

    .btn{
      width:100%; margin-top:12px; padding:14px;
      border-radius:var(--radius-md); border:1px solid transparent;
      background:var(--accent); color:#fff; font-size:16.5px; font-weight:800;
      cursor:pointer; transition:transform 0.08s ease, box-shadow 0.12s ease, filter 0.12s ease;
      font-family: "Be Vietnam Pro", "Inter", "Segoe UI", -apple-system, system-ui, sans-serif;
      min-height:50px;
    }
    .btn:hover{ filter:brightness(1.04); box-shadow:0 10px 22px rgba(76,141,255,0.28); }
    .btn:active{ transform:translateY(1px); }
    .btn:disabled{ opacity:0.65; cursor:not-allowed; box-shadow:none; }
    .btn.secondary{ background:transparent; color:var(--text); border:1px solid var(--border); }
    .btn.small{ padding:12px; font-size:15px; margin-top:8px; min-height:46px; }

    details#advanced{
      border:1px solid var(--border); border-radius:var(--radius-lg);
      background:#0f141b; margin-top:12px; overflow:hidden;
    }
    details#advanced > summary{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:13px 15px; cursor:pointer; font-weight:800; font-size:16px;
      list-style:none; background:rgba(255,255,255,0.02);
      font-family: "Be Vietnam Pro", "Inter", "Segoe UI", -apple-system, system-ui, sans-serif;
    }
    details#advanced > summary::-webkit-details-marker{ display:none; }
    details#advanced[open] > summary{ border-bottom:1px solid var(--border); }
    details #advancedContent{ padding:13px 15px 10px; }

    .inline-checkbox{ display:flex; gap:10px; align-items:center; font-weight:700; }
    .inline-checkbox input{ width:auto; transform:scale(1.1); }

    .status{
      margin-top:10px; padding:12px; border-radius:var(--radius-md);
      background:rgba(255,255,255,0.04); border:1px solid var(--border);
      font-size:13.5px; line-height:1.35; word-break:break-word; display:none;
    }
    .status.error{ border-color:rgba(248,113,113,0.7); color:#fecdd3; }
    a{ color:var(--accent); }

    /* Picker overlay */
    #pickerOverlay{
      position:fixed; inset:0; background:rgba(0,0,0,0.55);
      display:none; z-index:9999; padding:10px;
    }
    #pickerSheet{
      position:absolute; inset:auto 0 0 0;
      background:var(--card); border-radius:16px 16px 0 0;
      height:82vh; box-shadow:0 -16px 38px rgba(0,0,0,0.45);
      display:flex; flex-direction:column; overflow:hidden;
    }
    .pickerStickyTop{ padding:12px 12px 10px; border-bottom:1px solid var(--border); background:var(--card); }
    #pickerScroll{ flex:1 1 auto; overflow:auto; -webkit-overflow-scrolling:touch; padding:10px 12px 2px; }
    .pickerHeader{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; flex-wrap:wrap; }
    .pickerTitle{ font-weight:900; font-size:18px; }
    .pickerActions{ display:flex; gap:8px; flex-wrap:wrap; }
    .pillBtn{
      padding:10px 12px; border-radius:11px; border:1px solid var(--border);
      background:#0f141b; color:var(--text); font-weight:800; font-size:13.5px; cursor:pointer;
      font-family: "Be Vietnam Pro", "Inter", "Segoe UI", -apple-system, system-ui, sans-serif;
      min-height:42px;
    }
    .pickerRow{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .pickerRow input{ flex:1; min-width:160px; padding:11px 12px; }

    .song{
      display:flex; gap:10px; align-items:center;
      padding:10px; border:1px solid var(--border); border-radius:12px;
      margin:8px 0; background:rgba(255,255,255,0.02);
    }
    .song img{ width:46px; height:46px; border-radius:10px; object-fit:cover; background:#111; flex:0 0 auto; }
    .songTitle{ font-weight:800; font-size:14px; }
    .songMeta{ color:var(--muted); font-size:11.5px; word-break:break-all; }

    .sectionTitle{
      margin:0 0 8px; font-weight:800; font-size:17px;
      text-transform:uppercase; letter-spacing:0.02em; color:var(--muted);
      font-family: "Be Vietnam Pro", "Inter", "Segoe UI", -apple-system, system-ui, sans-serif;
    }
    hr{ border:none; border-top:1px solid var(--border); margin:10px 0; }

    /* Ưu tiên hiển thị lớn hơn trên màn nhỏ */
    @media (max-width:520px){
      body{ padding: 12px 10px 16px; }
      .wrap{ max-width: 100%; }
      .card{ padding:12px; }
      h1{ font-size:25px; }
      .sub{ font-size:14px; }
      label{ font-size:14px; margin:11px 0 6px; }
      input, select{ font-size:16px; padding:13px 13px; min-height:50px; }
      .btn{ padding:14px; font-size:17px; min-height:52px; }
      .btn.small{ font-size:15.5px; min-height:48px; }
      details#advanced > summary{ padding:13px 14px; font-size:16px; }
      .sectionTitle{ font-size:17.5px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>YTM Playlist Mixer</h1>
        <p class="sub">Trộn 2 playlist YouTube Music với tỷ lệ, ưu tiên và chế độ phát linh hoạt.</p>
      </div>
    </header>

    <div class="card">
      <div class="sectionTitle">Cấu hình chính</div>
      <label>Playlist A</label>
      <div class="field"><input id="playlistA" inputmode="url" placeholder="Dán link hoặc ID playlist A..." /></div>

      <label>Playlist B</label>
      <div class="field"><input id="playlistB" inputmode="url" placeholder="Dán link hoặc ID playlist B..." /></div>

      <label>Tên playlist (tuỳ chọn)</label>
      <div class="field"><input id="title" placeholder="Để trống sẽ tự đặt theo ngày-giờ" /></div>

      <div class="row two">
        <div>
          <label>Tổng số bài</label>
          <div class="field"><input id="totalItems" type="number" value="40" min="1" max="500" /></div>
          <div class="hint">1–500 bài.</div>
        </div>
        <div>
          <label>Bắt đầu bằng</label>
          <select id="startWith">
            <option value="A" selected>A</option>
            <option value="B">B</option>
          </select>
        </div>
      </div>

      <div class="row two">
        <div>
          <label>Tỷ lệ A</label>
          <div class="field"><input id="ratioA" type="number" value="1" min="0" max="50" /></div>
        </div>
        <div>
          <label>Tỷ lệ B</label>
          <div class="field"><input id="ratioB" type="number" value="1" min="0" max="50" /></div>
        </div>
      </div>

      <details id="advanced">
        <summary>Tuỳ chọn nâng cao<span aria-hidden="true">▾</span></summary>
        <div id="advancedContent">
          <div class="sectionTitle">Cách chọn bài</div>
          <div class="row two">
            <div>
              <label>Chọn bài A</label>
              <select id="pickModeA">
                <option value="SHUFFLE" selected>Ngẫu nhiên (Shuffle)</option>
                <option value="ORDER">Giữ thứ tự playlist</option>
              </select>
            </div>
            <div>
              <label>Chọn bài B</label>
              <select id="pickModeB">
                <option value="SHUFFLE" selected>Ngẫu nhiên (Shuffle)</option>
                <option value="ORDER">Giữ thứ tự playlist</option>
              </select>
            </div>
          </div>

          <div class="sectionTitle" style="margin-top:10px;">Riêng tư</div>
          <select id="privacy">
            <option value="PRIVATE" selected>Private</option>
            <option value="UNLISTED">Unlisted</option>
            <option value="PUBLIC">Public</option>
          </select>

          <label class="inline-checkbox" style="margin-top:12px;">
            <input id="allowDuplicates" type="checkbox" checked />
            Cho phép trùng bài khi lặp vòng để đủ số bài
          </label>

          <hr />

          <div class="sectionTitle">Ưu tiên bài</div>
          <label>Ưu tiên của A</label>
          <button type="button" class="btn secondary small" onclick="openPicker('A', false)">Chọn ưu tiên A</button>
          <div id="priorityASummary" class="hint">Chưa chọn bài ưu tiên cho A.</div>

          <div class="row two">
            <div>
              <label>Ưu tiên A phát đầu</label>
              <select id="priorityHeadA_mode" onchange="onPriorityHeadModeChange_('A')">
                <option value="OFF" selected>Tắt</option>
                <option value="ALL">Phát tất cả</option>
                <option value="CUSTOM">Tuỳ chọn…</option>
              </select>
              <input id="priorityHeadA" type="hidden" value="0" />
              <div id="priorityHeadA_customRow" class="prioHeadCustomRow" style="display:none; margin-top:6px;">
                <input id="priorityHeadA_custom" type="number" value="3" min="1" max="9999" inputmode="numeric"
                  placeholder="Nhập số bài ưu tiên phát đầu..." oninput="onPriorityHeadCustomInput_('A')" />
              </div>
            </div>
            <div>
              <label>Sau đó, lặp ưu tiên A mỗi N bài</label>
              <input id="priorityEveryA" type="number" value="5" min="0" max="9999" />
            </div>
          </div>

          <label style="margin-top:14px;">Ưu tiên của B</label>
          <button type="button" class="btn secondary small" onclick="openPicker('B', false)">Chọn ưu tiên B</button>
          <div id="priorityBSummary" class="hint">Chưa chọn bài ưu tiên cho B.</div>

          <div class="row two">
            <div>
              <label>Ưu tiên B phát đầu</label>
              <select id="priorityHeadB_mode" onchange="onPriorityHeadModeChange_('B')">
                <option value="OFF" selected>Tắt</option>
                <option value="ALL">Phát tất cả</option>
                <option value="CUSTOM">Tuỳ chọn…</option>
              </select>
              <input id="priorityHeadB" type="hidden" value="0" />
              <div id="priorityHeadB_customRow" class="prioHeadCustomRow" style="display:none; margin-top:6px;">
                <input id="priorityHeadB_custom" type="number" value="3" min="1" max="9999" inputmode="numeric"
                  placeholder="Nhập số bài ưu tiên phát đầu..." oninput="onPriorityHeadCustomInput_('B')" />
              </div>
            </div>
            <div>
              <label>Sau đó, lặp ưu tiên B mỗi N bài</label>
              <input id="priorityEveryB" type="number" value="15" min="0" max="9999" />
            </div>
          </div>
        </div>
      </details>

      <button id="createBtn" class="btn" onclick="create()">Tạo playlist mới</button>
      <button type="button" class="btn secondary small" onclick="clearState_()">Xoá cấu hình đã lưu</button>

      <div id="status" class="status"></div>
      <button id="openBtn" class="btn secondary" style="display:none;" onclick="openPlaylist()">Mở playlist</button>
    </div>
  </div>

  <!-- Picker overlay -->
  <div id="pickerOverlay">
    <div id="pickerSheet">
      <div class="pickerStickyTop">
        <div class="pickerHeader">
          <div class="pickerHeaderLeft">
            <div class="pickerTitle" id="pickerTitle">Chọn bài ưu tiên</div>
            <div class="hint" id="pickerCacheInfo" style="margin-top:6px;"></div>
          </div>
          <div class="pickerActions">
            <button class="pillBtn" onclick="pickerReload()">Tải lại</button>
            <button class="pillBtn" onclick="pickerClearCache()">Xoá</button>
            <button class="pillBtn" onclick="closePicker()">Đóng</button>
          </div>
        </div>

        <div class="pickerRow">
          <input id="pickerSearch" placeholder="Tìm theo tên bài..." oninput="renderPickerList()" />
          <button class="pillBtn" onclick="toggleAll(true)">Chọn hết</button>
          <button class="pillBtn" onclick="toggleAll(false)">Bỏ hết</button>
        </div>
      </div>

      <div id="pickerScroll">
        <div id="pickerList"></div>
      </div>

      <button id="pickerSaveBtn" class="btn" onclick="savePicker()">Lưu ưu tiên</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "ytm_mixer_state_v1";
    const CACHE_KEY_PREFIX = "ytm_mixer_playlist_cache_v1:";

    let lastUrl = "";
    let priorityAIds = [];
    let priorityBIds = [];
    let pickerMode = "A";
    let pickerItems = [];
    let pickerSelected = new Set();
    let pickerFilteredItemsCache = [];
    let pickerPlaylistLink = "";

    function extractPlaylistKey_(urlOrId){
      const s = String(urlOrId || "").trim();
      if (!s) return "";
      const m = s.match(/[?&]list=([a-zA-Z0-9_-]+)/);
      if (m) return m[1];
      if (/^[a-zA-Z0-9_-]{10,}$/.test(s)) return s;
      return s;
    }
    function cacheKeyForLocal_(playlistLink){
      const key = extractPlaylistKey_(playlistLink);
      return key ? (CACHE_KEY_PREFIX + key) : "";
    }
    function readPlaylistCacheLocal_(playlistLink){
      const k = cacheKeyForLocal_(playlistLink);
      if (!k) return null;
      try{ const raw = localStorage.getItem(k); if (!raw) return null; return JSON.parse(raw); }catch(e){ return null; }
    }
    function writePlaylistCacheLocal_(playlistLink, cacheObj){
      const k = cacheKeyForLocal_(playlistLink);
      if (!k) return;
      try{ localStorage.setItem(k, JSON.stringify(cacheObj)); }catch(e){}
    }
    function deletePlaylistCacheLocal_(playlistLink){
      const k = cacheKeyForLocal_(playlistLink);
      if (!k) return;
      try{ localStorage.removeItem(k); }catch(e){}
    }
    function formatAge_(iso){
      if (!iso) return "";
      const t = Date.parse(iso);
      if (!Number.isFinite(t)) return "";
      const diff = Date.now() - t;
      const min = Math.floor(diff / 60000);
      if (min < 1) return "vừa xong";
      if (min < 60) return `${min} phút trước`;
      const h = Math.floor(min / 60);
      return `${h} giờ trước`;
    }

    function onPriorityHeadModeChange_(letter){
      const modeEl = document.getElementById(`priorityHead${letter}_mode`);
      const hiddenEl = document.getElementById(`priorityHead${letter}`);
      const customRow = document.getElementById(`priorityHead${letter}_customRow`);
      const customInput = document.getElementById(`priorityHead${letter}_custom`);
      const mode = modeEl.value;
      if (mode === "OFF") { hiddenEl.value = "0"; if (customRow) customRow.style.display = "none"; }
      else if (mode === "ALL") { hiddenEl.value = "-1"; if (customRow) customRow.style.display = "none"; }
      else { if (customRow) customRow.style.display = "block"; const n = parseInt(customInput.value || "1", 10); hiddenEl.value = String(Number.isFinite(n) && n > 0 ? n : 1); }
      saveStateLocal_();
    }
    function onPriorityHeadCustomInput_(letter){
      const modeEl = document.getElementById(`priorityHead${letter}_mode`);
      if (modeEl.value !== "CUSTOM") return;
      const hiddenEl = document.getElementById(`priorityHead${letter}`);
      const customInput = document.getElementById(`priorityHead${letter}_custom`);
      const n = parseInt(customInput.value || "1", 10);
      hiddenEl.value = String(Number.isFinite(n) && n > 0 ? n : 1);
      saveStateLocal_();
    }
    function derivePriorityModeFromValue_(valueStr){
      const n = parseInt(String(valueStr ?? ""), 10);
      if (Number.isNaN(n)) return { mode: "OFF", custom: "1", hidden: "0" };
      if (n === 0) return { mode: "OFF", custom: "1", hidden: "0" };
      if (n === -1) return { mode: "ALL", custom: "1", hidden: "-1" };
      if (n > 0) return { mode: "CUSTOM", custom: String(n), hidden: String(n) };
      return { mode: "OFF", custom: "1", hidden: "0" };
    }

    function getState_() {
      return {
        playlistA: document.getElementById("playlistA")?.value || "",
        playlistB: document.getElementById("playlistB")?.value || "",
        title: document.getElementById("title")?.value || "",
        totalItems: document.getElementById("totalItems")?.value || "40",
        startWith: document.getElementById("startWith")?.value || "A",
        ratioA: document.getElementById("ratioA")?.value || "1",
        ratioB: document.getElementById("ratioB")?.value || "1",
        pickModeA: document.getElementById("pickModeA")?.value || "SHUFFLE",
        pickModeB: document.getElementById("pickModeB")?.value || "SHUFFLE",
        privacy: document.getElementById("privacy")?.value || "PRIVATE",
        allowDuplicates: !!document.getElementById("allowDuplicates")?.checked,
        priorityHeadA: document.getElementById("priorityHeadA")?.value ?? "0",
        priorityEveryA: document.getElementById("priorityEveryA")?.value ?? "5",
        priorityHeadB: document.getElementById("priorityHeadB")?.value ?? "0",
        priorityEveryB: document.getElementById("priorityEveryB")?.value ?? "0",
        priorityHeadA_mode: document.getElementById("priorityHeadA_mode")?.value ?? "OFF",
        priorityHeadA_custom: document.getElementById("priorityHeadA_custom")?.value ?? "1",
        priorityHeadB_mode: document.getElementById("priorityHeadB_mode")?.value ?? "OFF",
        priorityHeadB_custom: document.getElementById("priorityHeadB_custom")?.value ?? "1",
        priorityAIds: Array.isArray(priorityAIds) ? priorityAIds : [],
        priorityBIds: Array.isArray(priorityBIds) ? priorityBIds : [],
        savedAt: new Date().toISOString(),
      };
    }
    function applyState_(s) {
      if (!s || typeof s !== "object") return;
      const setVal = (id, v) => { const el = document.getElementById(id); if (!el || v === undefined || v === null) return; el.value = String(v); };
      const setChecked = (id, v) => { const el = document.getElementById(id); if (!el) return; el.checked = !!v; };

      setVal("playlistA", s.playlistA); setVal("playlistB", s.playlistB); setVal("title", s.title);
      setVal("totalItems", s.totalItems); setVal("startWith", s.startWith); setVal("ratioA", s.ratioA); setVal("ratioB", s.ratioB);
      setVal("pickModeA", s.pickModeA); setVal("pickModeB", s.pickModeB); setVal("privacy", s.privacy); setChecked("allowDuplicates", s.allowDuplicates);

      const a = (s.priorityHeadA_mode || s.priorityHeadA_custom)
        ? { mode: String(s.priorityHeadA_mode || "OFF"), custom: String(s.priorityHeadA_custom || "1"), hidden: String(s.priorityHeadA ?? "0") }
        : derivePriorityModeFromValue_(s.priorityHeadA);
      const b = (s.priorityHeadB_mode || s.priorityHeadB_custom)
        ? { mode: String(s.priorityHeadB_mode || "OFF"), custom: String(s.priorityHeadB_custom || "1"), hidden: String(s.priorityHeadB ?? "0") }
        : derivePriorityModeFromValue_(s.priorityHeadB);

      setVal("priorityHeadA_mode", a.mode); setVal("priorityHeadA_custom", a.custom); setVal("priorityHeadA", a.hidden);
      setVal("priorityHeadB_mode", b.mode); setVal("priorityHeadB_custom", b.custom); setVal("priorityHeadB", b.hidden);

      onPriorityHeadModeChange_("A"); onPriorityHeadModeChange_("B");
      setVal("priorityEveryA", s.priorityEveryA); setVal("priorityEveryB", s.priorityEveryB);

      priorityAIds = Array.isArray(s.priorityAIds) ? s.priorityAIds : [];
      priorityBIds = Array.isArray(s.priorityBIds) ? s.priorityBIds : [];
      updatePrioritySummary_();
    }
    function updatePrioritySummary_(){
      const aSum = document.getElementById("priorityASummary");
      const bSum = document.getElementById("priorityBSummary");
      if (aSum) aSum.textContent = priorityAIds.length ? `Đã chọn ${priorityAIds.length} bài ưu tiên cho A.` : "Chưa chọn bài ưu tiên cho A.";
      if (bSum) bSum.textContent = priorityBIds.length ? `Đã chọn ${priorityBIds.length} bài ưu tiên cho B.` : "Chưa chọn bài ưu tiên cho B.";
    }
    function saveStateLocal_() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(getState_())); } catch (e) {}
    }
    function loadStateLocal_() {
      try { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return; applyState_(JSON.parse(raw)); } catch (e) {}
    }
    function clearState_() {
      try {
        localStorage.removeItem(STORAGE_KEY);
        priorityAIds = []; priorityBIds = []; updatePrioritySummary_();
        document.getElementById("priorityHeadA_mode").value = "OFF";
        document.getElementById("priorityHeadB_mode").value = "OFF";
        document.getElementById("priorityHeadA_custom").value = "3";
        document.getElementById("priorityHeadB_custom").value = "3";
        onPriorityHeadModeChange_("A"); onPriorityHeadModeChange_("B");
      } catch (e) {}
    }
    function wireAutoSave_() {
      const ids = [
        "playlistA","playlistB","title","totalItems","startWith","ratioA","ratioB",
        "pickModeA","pickModeB","privacy","allowDuplicates",
        "priorityHeadA_mode","priorityHeadA_custom","priorityEveryA",
        "priorityHeadB_mode","priorityHeadB_custom","priorityEveryB"
      ];
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener("input", saveStateLocal_);
        el.addEventListener("change", saveStateLocal_);
      });
    }
    function saveStateCloud_() {
      const payload = getState_();
      google.script.run.withFailureHandler((err) => console.error("saveUserSettings error", err)).saveUserSettings(payload);
    }
    function loadStateCloud_() {
      google.script.run
        .withSuccessHandler((res) => { if (res && res.ok && res.data) { applyState_(res.data); saveStateLocal_(); } })
        .withFailureHandler((err) => console.error("loadUserSettings error", err))
        .loadUserSettings();
    }
    function loadPlaylistCacheCloud_(playlistLink, onDone) {
      google.script.run
        .withSuccessHandler((res) => { if (res && res.ok && res.data && Array.isArray(res.data.items)) onDone(null, res.data); else onDone(null, null); })
        .withFailureHandler((err) => onDone(err, null))
        .loadPlaylistCache({ playlist: playlistLink });
    }
    function savePlaylistCacheCloud_(playlistLink, items) {
      const playlistKey = extractPlaylistKey_(playlistLink);
      if (!playlistKey) return;
      google.script.run
        .withFailureHandler((err) => console.error("savePlaylistCache error", err))
        .savePlaylistCache({ playlistKey, fetchedAt: new Date().toISOString(), items: items || [] });
    }
    function clearPlaylistCacheCloud_(playlistLink, onDone) {
      google.script.run
        .withSuccessHandler((res) => onDone && onDone(null, res))
        .withFailureHandler((err) => onDone && onDone(err, null))
        .clearPlaylistCache({ playlist: playlistLink });
    }

    const val = (id) => document.getElementById(id).value;
    const checked = (id) => document.getElementById(id).checked;

    function setStatus(html, isError=false) {
      const el = document.getElementById('status');
      el.style.display = 'block';
      el.classList.toggle('error', isError);
      el.innerHTML = html;
    }
    function setLoading(loading){
      const btn = document.getElementById('createBtn');
      btn.disabled = loading;
      btn.textContent = loading ? "Đang tạo..." : "Tạo playlist mới";
    }
    function openPlaylist(){ if (lastUrl) window.location.href = lastUrl; }
    function pickerReload(){ if (!pickerPlaylistLink) return; openPicker(pickerMode, true); }
    function pickerClearCache(){
      if (!pickerPlaylistLink) return;
      const cacheInfoEl = document.getElementById("pickerCacheInfo");
      if (cacheInfoEl) cacheInfoEl.textContent = "Đang xoá cache...";
      deletePlaylistCacheLocal_(pickerPlaylistLink);
      clearPlaylistCacheCloud_(pickerPlaylistLink, (err) => {
        if (err) { console.error(err); if (cacheInfoEl) cacheInfoEl.textContent = "Xoá cache cloud thất bại (xem console)."; return; }
        if (cacheInfoEl) cacheInfoEl.textContent = "Đã xoá cache (máy + cloud).";
        pickerItems = [];
        document.getElementById('pickerList').innerHTML = `<div class="hint">Đã xoá cache. Bấm “Tải lại” để tải mới.</div>`;
      });
    }

    function openPicker(mode, forceReload){
      pickerMode = mode;
      const playlistLink = (mode === "A") ? val('playlistA') : val('playlistB');
      pickerPlaylistLink = playlistLink;
      if (!playlistLink.trim()){ setStatus("Bạn cần nhập link Playlist " + mode + " trước đã.", true); return; }

      document.getElementById('pickerTitle').textContent = `Chọn bài ưu tiên cho ${mode}`;
      document.getElementById('pickerOverlay').style.display = 'block';
      document.getElementById('pickerSearch').value = "";
      document.getElementById('pickerList').innerHTML = `<div class="hint">Đang chuẩn bị...</div>`;
      pickerSelected = new Set(mode === "A" ? priorityAIds : priorityBIds);
      const cacheInfoEl = document.getElementById("pickerCacheInfo");

      const cachedLocal = forceReload ? null : readPlaylistCacheLocal_(playlistLink);
      if (cachedLocal && Array.isArray(cachedLocal.items) && cachedLocal.items.length) {
        pickerItems = cachedLocal.items;
        if (cacheInfoEl) cacheInfoEl.textContent = `Dùng cache máy (${pickerItems.length} bài, tải ${formatAge_(cachedLocal.fetchedAt)}).`;
        renderPickerList(); return;
      }
      if (!forceReload) {
        if (cacheInfoEl) cacheInfoEl.textContent = "Không có cache máy. Đang tìm cache cloud...";
        loadPlaylistCacheCloud_(playlistLink, (err, cachedCloud) => {
          if (err) console.error(err);
          if (cachedCloud && Array.isArray(cachedCloud.items) && cachedCloud.items.length) {
            pickerItems = cachedCloud.items;
            writePlaylistCacheLocal_(playlistLink, { playlistKey: extractPlaylistKey_(playlistLink), fetchedAt: cachedCloud.fetchedAt || new Date().toISOString(), items: pickerItems });
            if (cacheInfoEl) cacheInfoEl.textContent = `Dùng cache cloud (${pickerItems.length} bài, tải ${formatAge_(cachedCloud.fetchedAt)}).`;
            renderPickerList(); return;
          }
          fetchPickerFromApi_();
        });
        return;
      }
      fetchPickerFromApi_();

      function fetchPickerFromApi_() {
        if (cacheInfoEl) cacheInfoEl.textContent = "Đang tải từ YouTube (tốn request)...";
        google.script.run
          .withSuccessHandler((res) => {
            pickerItems = (res && res.items) ? res.items : [];
            writePlaylistCacheLocal_(playlistLink, { playlistKey: extractPlaylistKey_(playlistLink), fetchedAt: new Date().toISOString(), items: pickerItems });
            savePlaylistCacheCloud_(playlistLink, pickerItems);
            if (cacheInfoEl) cacheInfoEl.textContent = `Đã tải mới (${pickerItems.length} bài).`;
            renderPickerList();
          })
          .withFailureHandler((err) => {
            document.getElementById('pickerList').innerHTML = `<div class="error">Lỗi tải playlist: ${escapeHtml(err.message || err)}</div>`;
            if (cacheInfoEl) cacheInfoEl.textContent = "";
          })
          .getPlaylistItemsForPicker({ playlist: playlistLink, maxItems: 250 });
      }
    }
    function closePicker(){ document.getElementById('pickerOverlay').style.display = 'none'; }
    function getFilteredItems_(){
      const q = document.getElementById('pickerSearch').value.trim().toLowerCase();
      const filtered = q ? pickerItems.filter(it => (it.title || '').toLowerCase().includes(q)) : pickerItems;
      pickerFilteredItemsCache = filtered; return filtered;
    }
    function renderPickerList(){
      const list = document.getElementById('pickerList');
      const filtered = getFilteredItems_();
      if (!filtered.length){ list.innerHTML = `<div class="hint">Không có bài nào (hoặc không khớp tìm kiếm).</div>`; return; }
      list.innerHTML = filtered.map(it => {
        const isOn = pickerSelected.has(it.videoId);
        const safeTitle = escapeHtml(it.title || it.videoId);
        const thumb = it.thumb ? `<img src="${it.thumb}" alt="">` : `<img alt="">`;
        return `
          <div class="song">
            <input type="checkbox" data-vid="${it.videoId}" ${isOn ? "checked" : ""} onchange="toggleOne(event)" style="width:auto; transform:scale(1.2);">
            ${thumb}
            <div style="display:flex; flex-direction:column; gap:2px; min-width:0;">
              <div class="songTitle">${safeTitle}</div>
              <div class="songMeta">${it.videoId}</div>
            </div>
          </div>
        `;
      }).join('');
    }
    function toggleOne(e){
      const vid = e.target.getAttribute('data-vid');
      if (!vid) return;
      if (e.target.checked) pickerSelected.add(vid); else pickerSelected.delete(vid);
    }
    function toggleAll(on){
      const filtered = pickerFilteredItemsCache.length ? pickerFilteredItemsCache : getFilteredItems_();
      filtered.forEach(it => { if (on) pickerSelected.add(it.videoId); else pickerSelected.delete(it.videoId); });
      renderPickerList();
    }
    function savePicker(){
      const arr = Array.from(pickerSelected);
      if (pickerMode === "A") priorityAIds = arr; else priorityBIds = arr;
      updatePrioritySummary_(); closePicker(); saveStateLocal_(); saveStateCloud_();
    }

    function create() {
      saveStateLocal_(); saveStateCloud_();
      document.getElementById('openBtn').style.display = 'none'; lastUrl = "";
      setLoading(true); setStatus("Đang tạo playlist... (có thể mất 10–60 giây)");
      const params = {
        playlistA: val('playlistA'), playlistB: val('playlistB'), title: val('title'),
        totalItems: val('totalItems'), startWith: val('startWith'), ratioA: val('ratioA'), ratioB: val('ratioB'),
        pickModeA: val('pickModeA') || "SHUFFLE", pickModeB: val('pickModeB') || "SHUFFLE",
        privacy: val('privacy') || "PRIVATE", allowDuplicates: checked('allowDuplicates'),
        priorityA: priorityAIds, priorityB: priorityBIds,
        priorityHeadA: document.getElementById("priorityHeadA").value, priorityHeadB: document.getElementById("priorityHeadB").value,
        priorityEveryA: val('priorityEveryA'), priorityEveryB: val('priorityEveryB'),
      };
      google.script.run
        .withSuccessHandler((res) => {
          lastUrl = res.url;
          setLoading(false);
          let failedHtml = "";
          if (res.failedCount) {
            const rows = (res.failedErrors || []).map(f =>
              `<li><code>${escapeHtml(f.videoId)}</code> — ${escapeHtml(f.error)}</li>`
            ).join("");
            failedHtml = `<br/>⚠️ Bài bị lỗi (${res.failedCount}):<ul style="margin:4px 0 0 16px;padding:0">${rows}</ul>`;
          }
          setStatus(
            `Xong: <b>${escapeHtml(res.title)}</b><br/>` +
            `Số bài: ${res.count} (A=${res.countA ?? "?"}, B=${res.countB ?? "?"}${res.failedCount ? `, lỗi=${res.failedCount}` : ""})<br/>` +
            `Link: <a href="${res.url}" target="_blank" rel="noopener">${res.url}</a>` +
            failedHtml
          );
          document.getElementById('openBtn').style.display = 'block';
        })
        .withFailureHandler((err) => {
          setLoading(false);
          setStatus(`<b>Lỗi:</b> ${escapeHtml(err.message || err)}`, true);
        })
        .createMixedPlaylist(params);
    }
    const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    window.addEventListener("load", () => {
      onPriorityHeadModeChange_("A");
      onPriorityHeadModeChange_("B");
      loadStateLocal_(); wireAutoSave_(); updatePrioritySummary_(); loadStateCloud_();
    });
  </script>
</body>
</html>
